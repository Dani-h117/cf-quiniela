name = "quiniela-mundial"
compatibility_date = "2024-09-23"

# Para desarrollo local: instala wrangler (npm i -g wrangler) y ejecuta:
#   wrangler pages dev . --kv QUINIELA_KV
#
# KV namespace en producción: se configura en el Dashboard de Cloudflare,
# NO en este archivo. Ver README, Paso 4.

[[kv_namespaces]]
binding = "QUINIELA_KV"
id      = "REEMPLAZA_CON_TU_KV_NAMESPACE_ID"      # solo para dev local
